name: GPSMock
options:
  bundleIdPrefix: com.louisdeng
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: Resources/GPSMock.entitlements
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    PRODUCT_NAME: GPSMock
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.louisdeng.GPSMock

targets:
  GPSMock:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources/Info.plist
        buildPhase: none
      - path: Resources/GPSMock.entitlements
        buildPhase: none
    dependencies: []
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: GPSMock
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: ""
        # OSRM routing requires outbound HTTPS.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        # Localized usage strings even though we don't use Core Location directly —
        # MapKit on macOS will sometimes prompt; harmless if unused.
        NSLocationUsageDescription: "Map centers on the last-used location to keep launches fast."
